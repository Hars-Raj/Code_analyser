<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Reviewer</title>

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

  <!-- Prism Tomorrow Night for refactored panel -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <span class="logo">Code Reviewer</span>
    <span class="tagline">Paste your code below and click analyse.</span>
  </header>

  <main>

    <div class="lang-bar">
      <label for="language">Language</label>
      <select id="language" name="language">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="typescript">TypeScript</option>
      </select>
    </div>

    <div id="code-area" class="code-area">

      <div id="original-panel" class="code-panel">
        <label>Your code</label>
        <textarea id="code-input" spellcheck="false"
          placeholder="Paste your code here..."></textarea>
      </div>

      <div id="refactored-panel" class="code-panel hidden">
        <label>Refactored code</label>
        <div class="code-display line-numbers">
          <pre><code id="refactored-code" class="language-python"></code></pre>
        </div>
      </div>

    </div>

    <div class="controls">
      <button type="button" id="analyse-btn">Analyse</button>
      <button type="button" id="refactor-btn" class="hidden" disabled>
        See Refactored Code
      </button>
    </div>

    <div id="results" class="hidden">

      <section id="ratings-section">
        <h2>Code Scores</h2>
        <div id="ratings-cards" class="ratings-cards"></div>
      </section>

      <section id="functionality-section">
        <h2>Functionality</h2>
        <p id="functionality-text"></p>
      </section>

      <section id="issues-section">
        <h2>Issues Found <span id="issue-count" class="issue-count"></span></h2>
        <div id="accordion"></div>
      </section>

      <section id="explanation-section" class="hidden">
        <h2>What Changed</h2>
        <p id="explanation-text"></p>
      </section>

      <section id="summary-section">
        <h2>Summary</h2>
        <p id="summary-text"></p>
      </section>

    </div>

  </main>

  <!-- CodeMirror -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/placeholder.min.js"></script>

  <!-- Prism -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
